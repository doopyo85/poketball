<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Billiards</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Russo One', sans-serif;
      overflow: hidden;
      box-sizing: border-box;
    }
    
    .table-felt {
      background: linear-gradient(145deg, #1a5f2a 0%, #0d4a1c 50%, #0a3d16 100%);
      box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
    }
    
    .wood-rail {
      background: linear-gradient(180deg, #8B4513 0%, #5D2E0C 50%, #3D1F08 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), inset 0 -2px 4px rgba(0,0,0,0.4);
    }
    
    .pocket {
      background: radial-gradient(circle, #000 60%, #1a1a1a 100%);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
    }
    
    .ball {
      border-radius: 50%;
      position: absolute;
      box-shadow: 
        inset -8px -8px 20px rgba(0,0,0,0.4),
        inset 5px 5px 10px rgba(255,255,255,0.3),
        0 4px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    .ball::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 20%;
      width: 30%;
      height: 30%;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    .cue-ball { background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 50%, #c0c0c0 100%); }
    .target-ball { background: linear-gradient(135deg, #ff4444 0%, #cc0000 50%, #990000 100%); }
    
    .ball-1 { background: linear-gradient(135deg, #ffdd00 0%, #ccaa00 50%, #997700 100%); }
    .ball-2 { background: linear-gradient(135deg, #0066ff 0%, #0044cc 50%, #003399 100%); }
    .ball-3 { background: linear-gradient(135deg, #ff4444 0%, #cc0000 50%, #990000 100%); }
    .ball-4 { background: linear-gradient(135deg, #9933ff 0%, #6600cc 50%, #440099 100%); }
    .ball-5 { background: linear-gradient(135deg, #ff8800 0%, #cc6600 50%, #994400 100%); }
    .ball-6 { background: linear-gradient(135deg, #00cc66 0%, #009944 50%, #006622 100%); }
    .ball-7 { background: linear-gradient(135deg, #cc4466 0%, #992233 50%, #661122 100%); }
    
    /* 스트라이프 공 겹침 오류 해결: position: relative 삭제 및 ::before 에 top, left 지정 */
    .ball-8 { background: repeating-linear-gradient(45deg, #ffdd00 0%, #ffdd00 10px, #fff 10px, #fff 20px); }
    .ball-8::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: repeating-linear-gradient(45deg, transparent 0%, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px); }
    .ball-9 { background: repeating-linear-gradient(45deg, #0066ff 0%, #0066ff 10px, #fff 10px, #fff 20px); }
    .ball-9::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background: repeating-linear-gradient(45deg, transparent 0%, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px); }
    
    .ball-black { background: linear-gradient(135deg, #1a1a1a 0%, #000 50%, #0a0a0a 100%); box-shadow: inset -8px -8px 20px rgba(0,0,0,0.8), inset 5px 5px 10px rgba(50,50,50,0.5), 0 4px 8px rgba(0,0,0,0.5); }
    
    .power-bar-bg {
      background: linear-gradient(90deg, #2d2d2d 0%, #1a1a1a 100%);
      border: 2px solid #444;
    }
    
    .power-bar-fill {
      background: linear-gradient(90deg, #00ff88 0%, #ffff00 50%, #ff4444 100%);
      transition: width 0.05s linear;
    }
    
    .game-over-overlay {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
    }
    
    .score-display {
      background: linear-gradient(135deg, #2d1f0f 0%, #1a1206 100%);
      border: 3px solid #8B4513;
    }
    
    .btn-play {
      background: linear-gradient(135deg, #00cc66 0%, #009944 100%);
      transition: all 0.2s;
    }
    
    .btn-play:hover {
      background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
      transform: scale(1.05);
    }
    
    .turn-indicator {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    @keyframes ballSink {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    
    .ball-sinking {
      animation: ballSink 0.3s ease-in forwards;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-900 flex items-center justify-center">
  <div class="flex flex-col md:flex-row items-start gap-8 w-full max-w-6xl justify-center">
    
    <div id="game-container" class="relative flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-4xl flex justify-between items-center mb-4 px-4">
       <div class="score-display px-6 py-3 rounded-lg"><span class="text-amber-200 text-sm">SCORE</span> <span id="score" class="text-white text-2xl ml-2">0</span>
       </div>
       <h1 id="game-title" class="text-amber-200 text-2xl tracking-wider">POCKET BILLIARDS</h1>
       <div class="score-display px-6 py-3 rounded-lg"><span class="text-amber-200 text-sm">BALLS</span> <span id="balls-left" class="text-white text-2xl ml-2">7</span>
       </div>
      </div>
      
      <div id="turn-indicator" class="turn-indicator mb-3 px-6 py-2 rounded-full bg-amber-600 text-white text-sm">
        🎱 YOUR TURN - Click cue ball and drag to aim
      </div>
      
      <div class="relative">
       <div class="wood-rail absolute -inset-6 rounded-xl"></div>
       <div class="absolute -inset-3 rounded-lg" style="background: #0f4f20; border: 4px solid #2d5a3a;"></div>
       <div id="table" class="table-felt relative rounded-md overflow-hidden" style="width: 700px; height: 400px;">
        <div class="pocket absolute w-12 h-12 rounded-full" style="top: -6px; left: -6px;"></div>
        <div class="pocket absolute w-12 h-12 rounded-full" style="top: -6px; right: -6px;"></div>
        <div class="pocket absolute w-12 h-12 rounded-full" style="bottom: -6px; left: -6px;"></div>
        <div class="pocket absolute w-12 h-12 rounded-full" style="bottom: -6px; right: -6px;"></div>
        <div class="pocket absolute w-10 h-10 rounded-full" style="top: -5px; left: 50%; transform: translateX(-50%);"></div>
        <div class="pocket absolute w-10 h-10 rounded-full" style="bottom: -5px; left: 50%; transform: translateX(-50%);"></div>
        
        <div id="balls-container"></div>
        
        <canvas id="aim-canvas" width="700" height="400" class="absolute top-0 left-0 pointer-events-none z-10 hidden"></canvas>
       </div>
      </div>
      
      <div class="mt-6 w-full max-w-md">
       <div class="power-bar-bg h-6 rounded-full overflow-hidden">
        <div id="power-bar" class="power-bar-fill h-full w-0"></div>
       </div>
       <div class="flex justify-between text-xs text-gray-400 mt-1 px-1"><span>SOFT</span> <span>POWER</span> <span>HARD</span>
       </div>
      </div>
      
      <div class="mt-4 text-gray-400 text-sm text-center">
       <p><span class="text-white font-bold">← A | D →</span> 각도 조정 • <span class="text-white font-bold">SPACE</span> 파워 게이지 시작</p>
       <p class="text-amber-400 mt-1">공을 넣으면 추가 기회 획득!</p>
      </div>
      
      <div id="game-over" class="game-over-overlay absolute inset-0 hidden flex-col items-center justify-center z-50">
       <div class="text-center">
        <h2 class="text-5xl text-amber-400 mb-4">🎱 GAME OVER</h2>
        <div class="score-display px-12 py-6 rounded-xl mb-8">
         <p class="text-amber-200 text-xl mb-2">FINAL SCORE</p>
         <p id="final-score" class="text-6xl text-white">0</p>
        </div>
        <p id="result-message" class="text-2xl text-gray-300 mb-8"></p>
        <button id="restart-btn" class="btn-play px-10 py-4 rounded-xl text-white text-xl font-bold shadow-lg"> 🔄 PLAY AGAIN </button>
       </div>
      </div>
    </div>

    <div id="ranking-board" class="w-72 bg-gray-800 border-2 border-amber-600 rounded-xl p-5 shadow-2xl mt-8 hidden md:block">
      <h2 class="text-2xl text-amber-400 font-bold mb-4 text-center border-b border-gray-600 pb-2">🏆 명예의 전당</h2>
      <ul id="ranking-list" class="space-y-3 text-lg font-mono">
        </ul>
    </div>

  </div>

  <script>
    // Config
    const defaultConfig = {
      game_title: 'POCKET BILLIARDS',
      background_color: '#111827',
      table_color: '#1a5f2a',
      text_color: '#fde68a',
      accent_color: '#d97706',
      button_color: '#00cc66'
    };
    
    let config = { ...defaultConfig };
    
    // Game State
    const BALL_RADIUS = 14;
    const TABLE_WIDTH = 700;
    const TABLE_HEIGHT = 400;
    const FRICTION = 0.985;
    const POCKET_RADIUS = 24;
    const POCKET_POSITIONS = [
      { x: 0, y: 0 },
      { x: TABLE_WIDTH, y: 0 },
      { x: 0, y: TABLE_HEIGHT },
      { x: TABLE_WIDTH, y: TABLE_HEIGHT },
      { x: TABLE_WIDTH / 2, y: 0 },
      { x: TABLE_WIDTH / 2, y: TABLE_HEIGHT }
    ];
    
    let balls = [];
    let cueBall = null;
    let isAiming = false;
    let currentAngle = 0; // Angle in radians
    let aimActive = false;
    let powerAnimating = false;
    let powerDirection = 1; // 1 for increasing, -1 for decreasing
    let power = 0;
    let score = 0;
    let ballsPocketed = 0;
    let canShoot = true;
    let ballsMoving = false;
    let pocketedThisShot = false;
    let cueBallPocketed = false;
    let shotsRemaining = 3;
    let initialBallCount = 10;
    
    // 랭킹 보드 관리 시스템
    function saveScoreAndRank(finalScore) {
      if(finalScore <= 0) return; 

      setTimeout(() => {
        const playerName = prompt(`게임 종료! 최종 점수: ${finalScore}점\n랭킹에 등록할 이름을 입력하세요:`);
        if (playerName) {
          let rankings = JSON.parse(localStorage.getItem('poolRankings') || '[]');
          rankings.push({ name: playerName.slice(0, 10), score: finalScore });
          
          rankings.sort((a, b) => b.score - a.score);
          rankings = rankings.slice(0, 10);
          
          localStorage.setItem('poolRankings', JSON.stringify(rankings));
          displayRankings();
        }
      }, 500);
    }

    function displayRankings() {
      const list = document.getElementById('ranking-list');
      if (!list) return;
      const rankings = JSON.parse(localStorage.getItem('poolRankings') || '[]');
      
      if (rankings.length === 0) {
        list.innerHTML = '<li class="text-gray-500 text-center text-sm">아직 등록된 랭킹이 없습니다.</li>';
        return;
      }
      
      list.innerHTML = rankings.map((r, i) => `
        <li class="flex justify-between items-center bg-gray-700 p-2 rounded ${i < 3 ? 'text-amber-400 font-bold' : 'text-gray-300'}">
          <span>${i + 1}. ${r.name}</span>
          <span class="text-white">${r.score} pt</span>
        </li>
      `).join('');
    }

    // Initialize game
    function initGame() {
      balls = [];
      score = 0;
      ballsPocketed = 0;
      canShoot = true;
      pocketedThisShot = false;
      cueBallPocketed = false;
      currentAngle = 0;
      aimActive = false;
      powerAnimating = false;
      power = 0;
      shotsRemaining = 3;
      
      updateScore();
      updateBallsLeft();
      
      const container = document.getElementById('balls-container');
      container.innerHTML = '';
      
      // Create cue ball
      cueBall = createBall(150, TABLE_HEIGHT / 2, 'cue-ball', true);
      balls.push(cueBall);
      
      const startX = 500;
      const startY = TABLE_HEIGHT / 2;
      
      const ballClasses = ['ball-1', 'ball-2', 'ball-3', 'ball-6', 'ball-black', 'ball-7', 'ball-4', 'ball-8', 'ball-9', 'ball-5'];
      
      const positions = [
        { row: 0, col: 0, class: 'ball-1' },
        { row: 1, col: 0, class: 'ball-2' },
        { row: 1, col: 1, class: 'ball-3' },
        { row: 2, col: 0, class: 'ball-6' },
        { row: 2, col: 1, class: 'ball-black' },
        { row: 2, col: 2, class: 'ball-7' },
        { row: 3, col: 0, class: 'ball-4' },
        { row: 3, col: 1, class: 'ball-8' },
        { row: 3, col: 2, class: 'ball-9' },
        { row: 3, col: 3, class: 'ball-5' }
      ];
      
      positions.forEach(pos => {
        const x = startX + pos.row * (BALL_RADIUS * 2 + 2);
        const y = startY - pos.row * (BALL_RADIUS + 1) + pos.col * (BALL_RADIUS * 2 + 2);
        const ball = createBall(x, y, pos.class, false);
        ball.isBlackBall = pos.class === 'ball-black';
        balls.push(ball);
      })
      
      document.getElementById('game-over').classList.add('hidden');
      document.getElementById('game-over').classList.remove('flex');
      aimActive = true;
      updateAimLine();
      document.getElementById('turn-indicator').textContent = `🎱 기회 ${shotsRemaining}번 남음 • ← A | D → 각도 조정`;
    }
    
    function createBall(x, y, className, isCue) {
      const container = document.getElementById('balls-container');
      const ball = document.createElement('div');
      ball.className = `ball ${className}`;
      ball.style.width = `${BALL_RADIUS * 2}px`;
      ball.style.height = `${BALL_RADIUS * 2}px`;
      ball.style.left = `${x - BALL_RADIUS}px`;
      ball.style.top = `${y - BALL_RADIUS}px`;
      
      container.appendChild(ball);
      
      return {
        element: ball,
        x: x,
        y: y,
        vx: 0,
        vy: 0,
        isCue: isCue,
        active: true
      };
    }
    
    function updateBallPosition(ball) {
      if (ball.active && ball.element) {
        ball.element.style.left = `${ball.x - BALL_RADIUS}px`;
        ball.element.style.top = `${ball.y - BALL_RADIUS}px`;
      }
    }
    
    function updateScore() {
      document.getElementById('score').textContent = score;
    }
    
    function updateBallsLeft() {
      const remaining = balls.filter(b => !b.isCue && b.active).length;
      document.getElementById('balls-left').textContent = remaining;
    }
    
    // Physics
    function updatePhysics() {
      let anyMoving = false;
      
      balls.forEach(ball => {
        if (!ball.active) return;
        
        ball.x += ball.vx;
        ball.y += ball.vy;
        
        ball.vx *= FRICTION;
        ball.vy *= FRICTION;
        
        if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
          ball.vx = 0;
          ball.vy = 0;
        }
        
        if (ball.x - BALL_RADIUS < 0) {
          ball.x = BALL_RADIUS;
          ball.vx *= -0.8;
        }
        if (ball.x + BALL_RADIUS > TABLE_WIDTH) {
          ball.x = TABLE_WIDTH - BALL_RADIUS;
          ball.vx *= -0.8;
        }
        if (ball.y - BALL_RADIUS < 0) {
          ball.y = BALL_RADIUS;
          ball.vy *= -0.8;
        }
        if (ball.y + BALL_RADIUS > TABLE_HEIGHT) {
          ball.y = TABLE_HEIGHT - BALL_RADIUS;
          ball.vy *= -0.8;
        }
        
        if (Math.abs(ball.vx) > 0.1 || Math.abs(ball.vy) > 0.1) {
          anyMoving = true;
        }
        
        updateBallPosition(ball);
      });
      
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          if (!balls[i].active || !balls[j].active) continue;
          checkBallCollision(balls[i], balls[j]);
        }
      }
      
      balls.forEach(ball => {
        if (!ball.active) return;
        checkPocket(ball);
      });
      
      ballsMoving = anyMoving;
      
      if (!anyMoving && !canShoot) {
        endTurn();
      }
    }
    
    function checkBallCollision(ball1, ball2) {
      const dx = ball2.x - ball1.x;
      const dy = ball2.y - ball1.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < BALL_RADIUS * 2) {
        const nx = dx / dist;
        const ny = dy / dist;
        
        const dvx = ball1.vx - ball2.vx;
        const dvy = ball1.vy - ball2.vy;
        const dvn = dvx * nx + dvy * ny;
        
        if (dvn > 0) {
          ball1.vx -= dvn * nx * 0.9;
          ball1.vy -= dvn * ny * 0.9;
          ball2.vx += dvn * nx * 0.9;
          ball2.vy += dvn * ny * 0.9;
          
          const overlap = BALL_RADIUS * 2 - dist;
          ball1.x -= overlap * nx / 2;
          ball1.y -= overlap * ny / 2;
          ball2.x += overlap * nx / 2;
          ball2.y += overlap * ny / 2;
        }
      }
    }
    
    function checkPocket(ball) {
      for (const pocket of POCKET_POSITIONS) {
        const dx = ball.x - pocket.x;
        const dy = ball.y - pocket.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < POCKET_RADIUS) {
          ball.active = false;
          ball.element.classList.add('ball-sinking');
          
          setTimeout(() => {
            if (ball.element) {
              ball.element.style.display = 'none';
            }
          }, 300);
          
          if (ball.isCue) {
            cueBallPocketed = true;
          } else if (ball.isBlackBall) {
            gameOver(false, true);
          } else {
            pocketedThisShot = true;
            ballsPocketed++;
            score += 100;
            updateScore();
            updateBallsLeft();
          }
          break;
        }
      }
    }
    
    function endTurn() {
      if (cueBallPocketed) {
        cueBall.x = 150;
        cueBall.y = TABLE_HEIGHT / 2;
        cueBall.vx = 0;
        cueBall.vy = 0;
        cueBall.active = true;
        cueBall.element.classList.remove('ball-sinking');
        cueBall.element.style.display = 'block';
        updateBallPosition(cueBall);
        cueBallPocketed = false;
        
        score = Math.max(0, score - 50);
        updateScore();
        
        document.getElementById('turn-indicator').textContent = '❌ 스크래치! -50점 • 각도를 조정하고 SPACE 누르기';
        setTimeout(() => {
          if (canShoot) {
            document.getElementById('turn-indicator').textContent = '🎱 각도를 조정하고 SPACE를 눌러 파워 게이지 시작';
            aimActive = true; 
            updateAimLine();
          }
        }, 1500);
      }
      
      const remainingBalls = balls.filter(b => !b.isCue && b.active).length;
      
      if (remainingBalls === 0) {
        gameOver(true);
        return;
      }
      
      if (pocketedThisShot) {
        canShoot = true;
        pocketedThisShot = false;
        document.getElementById('turn-indicator').textContent = `🎉 대성공! 기회 ${shotsRemaining}번 • 각도 조정 후 SPACE`;
        setTimeout(() => {
          document.getElementById('turn-indicator').textContent = `🎱 기회 ${shotsRemaining}번 남음 • ← A | D → 각도 조정`;
        }, 1500);
        
        aimActive = true;
        updateAimLine();
        
      } else {
        shotsRemaining--;
        
        if (shotsRemaining <= 0) {
          gameOver(false);
        } else {
          canShoot = true;
          pocketedThisShot = false;
          document.getElementById('turn-indicator').textContent = `❌ 실패! 기회 ${shotsRemaining}번 남음 • 각도 조정`;
          
          aimActive = true;
          updateAimLine();
        }
      }
    }
    
    function gameOver(won, blackBallFoul = false) {
      canShoot = false;
      
      const finalScore = score;
      document.getElementById('final-score').textContent = finalScore;
      
      const remainingBalls = balls.filter(b => !b.isCue && b.active).length;
      let message = '';
      
      if (blackBallFoul) {
        message = '💀 검정공을 넣었어요! 게임 오버!';
      } else if (won) {
        message = '🏆 완벽한 게임! 모든 공을 넣었어요!';
        score += 500; // Bonus
        document.getElementById('final-score').textContent = score;
      } else {
        message = `남은 공: ${remainingBalls}개`;
      }
      
      document.getElementById('result-message').textContent = message;
      document.getElementById('game-over').classList.remove('hidden');
      document.getElementById('game-over').classList.add('flex');
      document.getElementById('turn-indicator').textContent = 'GAME OVER';

      saveScoreAndRank(score); 
    }
    
    // Canvas Aim Line & Cue Stick
    const aimCanvas = document.getElementById('aim-canvas');
    const powerBar = document.getElementById('power-bar');
    
    function updateAimLine() {
      if (!aimCanvas) return;
      const ctx = aimCanvas.getContext('2d');
      ctx.clearRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);
      
      if (!aimActive || !canShoot || ballsMoving || !cueBall.active) {
        aimCanvas.classList.add('hidden');
        return;
      }
      
      aimCanvas.classList.remove('hidden');

      // 점선(가이드선) 그리기
      let x = cueBall.x;
      let y = cueBall.y;
      let dx = Math.cos(currentAngle);
      let dy = Math.sin(currentAngle);
      let length = 350;

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.lineWidth = 2;

      for (let i = 0; i < length; i += 2) {
        x += dx * 2;
        y += dy * 2;
        let hitWall = false;
        
        if (x <= BALL_RADIUS) { 
          x = BALL_RADIUS; dx *= -1; hitWall = true; 
        } else if (x >= TABLE_WIDTH - BALL_RADIUS) { 
          x = TABLE_WIDTH - BALL_RADIUS; dx *= -1; hitWall = true; 
        }
        
        if (y <= BALL_RADIUS) { 
          y = BALL_RADIUS; dy *= -1; hitWall = true; 
        } else if (y >= TABLE_HEIGHT - BALL_RADIUS) { 
          y = TABLE_HEIGHT - BALL_RADIUS; dy *= -1; hitWall = true; 
        }

        if (hitWall) {
          ctx.lineTo(x, y);
        }
      }
      ctx.lineTo(x, y);
      ctx.stroke();

      // 큐대(Cue Stick) 그리기
      ctx.setLineDash([]);
      
      const pullback = power * 60; 
      const cueDistance = BALL_RADIUS + 5 + pullback; 
      const cueLength = 250; 
      const cueThickness = 6; 

      const tipX = cueBall.x - Math.cos(currentAngle) * cueDistance;
      const tipY = cueBall.y - Math.sin(currentAngle) * cueDistance;
      const endX = cueBall.x - Math.cos(currentAngle) * (cueDistance + cueLength);
      const endY = cueBall.y - Math.sin(currentAngle) * (cueDistance + cueLength);

      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(endX, endY);
      ctx.lineWidth = cueThickness;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#8B4513';
      ctx.stroke();

      const tipEndX = cueBall.x - Math.cos(currentAngle) * (cueDistance + 8);
      const tipEndY = cueBall.y - Math.sin(currentAngle) * (cueDistance + 8);
      
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipEndX, tipEndY);
      ctx.lineWidth = cueThickness - 1;
      ctx.strokeStyle = '#00aaff';
      ctx.stroke();
    }
    
    // Animate power bar
    function animatePowerBar() {
      if (!powerAnimating) return;
      
      power += 0.02 * powerDirection;
      
      if (power >= 1) {
        power = 1;
        powerDirection = -1;
      } else if (power <= 0) {
        power = 0;
        powerDirection = 1;
      }
      
      powerBar.style.width = `${power * 100}%`;
      
      updateAimLine();
      
      requestAnimationFrame(animatePowerBar);
    }
    
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
      if (!canShoot || ballsMoving || !cueBall.active) return;
      
      if (e.key === 'a' || e.key === 'A') {
        currentAngle -= 0.0175;
        aimActive = true;
        updateAimLine();
      } else if (e.key === 'd' || e.key === 'D') {
        currentAngle += 0.0175;
        aimActive = true;
        updateAimLine();
      } else if (e.code === 'Space') {
        e.preventDefault();
        
        if (!powerAnimating) {
          powerAnimating = true;
          aimActive = true;
          updateAimLine();
          document.getElementById('turn-indicator').textContent = '⚡ SPACE를 눌러 파워 저장!';
          animatePowerBar();
        }
      }
    });
    
    document.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        
        if (powerAnimating) {
          powerAnimating = false; 
          
          const finalPower = power; 
          
          function strikeAnimation() {
            power -= 0.15; 
            
            if (power <= 0) {
              power = 0;
              aimActive = false;
              aimCanvas.classList.add('hidden');
              
              if (finalPower > 0.1) {
                const speed = finalPower * 40;
                cueBall.vx = Math.cos(currentAngle) * speed;
                cueBall.vy = Math.sin(currentAngle) * speed;
                
                canShoot = false;
                pocketedThisShot = false;
                document.getElementById('turn-indicator').textContent = '🎱 공이 굴러가는 중...';
              }
              
              powerBar.style.width = '0%';
              powerDirection = 1;
            } else {
              updateAimLine();
              requestAnimationFrame(strikeAnimation);
            }
          }
          
          strikeAnimation(); 
        }
      }
    });
    
    // Restart button
    document.getElementById('restart-btn').addEventListener('click', initGame);
    
    // Game loop
    function gameLoop() {
      updatePhysics();
      requestAnimationFrame(gameLoop);
    }
    
    // Element SDK
    async function onConfigChange(cfg) {
      document.getElementById('game-title').textContent = cfg.game_title || defaultConfig.game_title;
      document.body.style.backgroundColor = cfg.background_color || defaultConfig.background_color;
    }
    
    function mapToCapabilities(cfg) {
      return {
        recolorables: [
          { get: () => cfg.background_color || defaultConfig.background_color, set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => cfg.text_color || defaultConfig.text_color, set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => cfg.accent_color || defaultConfig.accent_color, set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => cfg.button_color || defaultConfig.button_color, set: (v) => { cfg.button_color = v; window.elementSdk.setConfig({ button_color: v }); } }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }
    
    function mapToEditPanelValues(cfg) {
      return new Map([
        ['game_title', cfg.game_title || defaultConfig.game_title]
      ]);
    }
    
    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
    
    // Start game & 랭킹보드 초기화
    initGame();
    displayRankings();
    gameLoop();
  </script>
 </body>
</html>
